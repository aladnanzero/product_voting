<!DOCTYPE html>
<!-- 
=============================================
ফাইল: index.html
বর্ণনা: গ্রাহকদের জন্য ভোটিং পেজ।
কীভাবে সম্পাদনা করবেন: UI কাস্টমাইজ করতে এই ফাইলটি পরিবর্তন করুন। 
নতুন পণ্য যোগ করতে products.js ফাইলটি ব্যবহার করুন।
=============================================
-->
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>পোশাক পছন্দ ভোটিং</title>
  
  <!-- Google Fonts: Hind Siliguri for Bengali -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg: #080810;
      --accent: #e91e8c;
      --accent2: #7c3aed;
      --text: #f1f1f1;
      --subtext: #9ca3af;
    }

    body {
      font-family: 'Helvetica Neue', 'Hind Siliguri', Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      margin: 0;
    }

    /* Animated Gradient Background Mesh */
    .bg-mesh {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: -1;
      background: 
        radial-gradient(circle at 15% 50%, rgba(233, 30, 140, 0.15), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(124, 58, 237, 0.15), transparent 25%);
      animation: meshGradient 15s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes meshGradient {
      0% { background-position: 0% 0%; }
      100% { background-position: 100% 100%; }
    }

    /* Card Animations */
    .product-card {
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s ease, border-color 0.3s ease;
      opacity: 0;
      transform: translateY(20px);
    }

    .product-card.loaded {
      opacity: 1;
      transform: translateY(0);
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px -5px rgba(233, 30, 140, 0.2);
    }

    .product-image {
      transition: transform 0.5s ease;
    }

    .product-card:hover .product-image {
      transform: scale(1.05);
    }

    /* Vote Button Animations */
    .vote-btn:active {
      transform: scale(0.95);
    }

    .vote-btn.voted {
      cursor: not-allowed;
      pointer-events: none;
    }

    /* Floating Particle Animation */
    @keyframes flyUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
    }

    .particle {
      position: absolute;
      color: var(--accent);
      font-weight: bold;
      pointer-events: none;
      z-index: 10;
      animation: flyUp 1s ease-out forwards;
    }

    /* Toast Notification */
    #toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      padding: 12px 24px;
      border-radius: 999px;
      font-weight: 500;
      color: white;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
      animation: toastSlideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, toastFadeOut 0.3s 2.7s ease-in forwards;
      pointer-events: auto;
    }

    .toast.success { background: linear-gradient(135deg, #10b981, #059669); }
    .toast.warning { background: linear-gradient(135deg, #f59e0b, #d97706); }

    @keyframes toastSlideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes toastFadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
  </style>
</head>
<body class="antialiased selection:bg-pink-500 selection:text-white flex flex-col p-4 md:p-6 gap-6 min-h-screen">
  
  <div class="bg-mesh"></div>

  <!-- Header -->
  <header class="h-auto md:h-20 bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl flex flex-col md:flex-row items-center justify-between px-6 md:px-8 py-4 md:py-0 shadow-2xl max-w-7xl mx-auto w-full z-40 relative">
    <div class="flex flex-col items-center md:items-start">
      <h1 class="text-3xl font-bold bg-gradient-to-r from-[#e91e8c] to-[#7c3aed] bg-clip-text text-transparent text-center md:text-left mb-1 md:mb-0">পোশাক পছন্দ ভোটিং</h1>
      <p class="text-xs text-gray-400">আপনার পছন্দের কাপড়টি বেছে নিন</p>
    </div>
    
    <div class="flex items-center gap-4 md:gap-6 mt-4 md:mt-0">
      <div class="flex flex-col items-end">
        <span class="text-[10px] uppercase tracking-widest text-[#9ca3af]">মোট ভোট</span>
        <span id="total-votes-counter" class="text-2xl font-mono font-bold text-white transition-all">0</span>
      </div>
      <div class="h-10 w-[1px] bg-white/10 hidden md:block"></div>
      <a href="admin.html" class="bg-white/10 hover:bg-white/20 transition-colors px-4 py-2 rounded-lg border border-white/10 text-xs font-semibold hidden md:block text-white">Admin Dashboard</a>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 w-full max-w-7xl mx-auto flex flex-col gap-6">
    <!-- Deadline Warning (If arbitrary) -->
    <div id="deadline-container" class="hidden text-center bg-red-500/10 py-3 px-6 rounded-2xl border border-red-500/30 text-red-200">
        <i class="fa-regular fa-clock mr-2"></i>
        <span>ভোটিং শেষ হবে: <strong id="deadline-date"></strong></span>
    </div>

    <!-- Products Grid Section -->
    <section class="bg-white/[0.03] border border-white/10 rounded-3xl p-4 md:p-6 flex flex-col gap-4 overflow-hidden relative">
      <div class="flex justify-between items-center mb-2">
        <h2 class="text-lg font-medium text-white/80">পণ্য তালিকা</h2>
        <div class="flex gap-2">
          <span class="px-3 py-1 bg-green-500/20 text-green-400 text-[10px] rounded-full border border-green-500/30 font-bold uppercase tracking-wider">LIVE</span>
        </div>
      </div>
      
      <!-- Product Grid -->
      <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 h-full">
        <!-- Products will be injected here via JS -->
      </div>
    </section>
  </main>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <footer class="mt-auto pt-4 relative">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center text-[10px] text-white/30 italic px-6">
      <p>© <span id="current-year"></span> ভোটিং সিস্টেম | সকল ভোট সংরক্ষিত হচ্ছে</p>
      
      <!-- Hidden Admin Link -->
      <a href="admin.html" class="mt-2 md:mt-0 text-white/30 hover:text-white transition-colors">Admin Login</a>
    </div>
  </footer>

  <!-- Link Configuration Data -->
  <script src="products.js"></script>
  
  <script>
    // ==========================================
    // গ্লোবাল ভেরিয়েবল এবং ইনিশিয়ালাইজেশন
    // ==========================================
    document.getElementById('current-year').textContent = new Date().getFullYear();
    const gridContainer = document.getElementById('products-grid');
    const totalVotesCounter = document.getElementById('total-votes-counter');
    
    // অ্যাপ্লিকেশন শুরু করার ফাংশন
    function initApp() {
      renderProducts();
      updateTotalVotesCounter();
      checkDeadline();
      setupStorageEvents(); // Listen for changes from other tabs
    }

    // ==========================================
    // ডেটা হ্যান্ডলিং (Local Storage)
    // ==========================================
    
    // নির্দিষ্ট পণ্যের ভোট সংখ্যা আনুন
    function getVotes(productId) {
      return parseInt(localStorage.getItem(`vote_count_${productId}`) || '0');
    }

    // মোট ভোট সংখ্যা গণনা করুন
    function getTotalVotes() {
      let total = 0;
      PRODUCTS.forEach(p => {
        total += getVotes(p.id);
      });
      return total;
    }

    // ==========================================
    // UI আপডেট লজিক
    // ==========================================

    // পণ্যগুলো স্ক্রিনে দেখানোর ফাংশন
    function renderProducts() {
      gridContainer.innerHTML = '';
      
      PRODUCTS.forEach((product, index) => {
        // Create Product Card
        const card = document.createElement('div');
        const hasVoted = sessionStorage.getItem(`session_voted_${product.id}`) === 'true';
        const votedBorderClass = hasVoted ? 'border-[#e91e8c]/50 ring-1 ring-[#e91e8c]/30' : 'border-white/10';
        
        card.className = `bg-white/5 border ${votedBorderClass} rounded-2xl overflow-hidden flex flex-col shadow-lg product-card`;
        // Stagger animation
        card.style.transitionDelay = `${index * 50}ms`;
        
        const currentVotes = getVotes(product.id);
        
        card.innerHTML = `
          <div class="h-32 md:h-40 bg-[#1a1a2e] flex items-center justify-center overflow-hidden">
            <!-- Fallback image mechanism using onerror -->
            <img src="${product.image}" 
                 onerror="this.onerror=null; this.src='${PLACEHOLDER}';" 
                 alt="${product.name}" 
                 class="product-image w-full h-full object-cover">
          </div>
          
          <div class="p-3 md:p-4 flex-1 flex flex-col justify-between">
            <span class="text-sm font-medium text-white">${product.name}</span>
            
            <button 
              id="btn-${product.id}"
              onclick="castVote(${product.id}, event)" 
              class="vote-btn mt-3 w-full py-2 rounded-xl text-[10px] md:text-xs font-bold flex items-center justify-center gap-1 md:gap-2 transition-all ${hasVoted ? 'bg-gradient-to-r from-[#e91e8c] to-[#7c3aed] text-white voted' : 'bg-white/10 text-white hover:bg-white/20'}">
              <span id="btn-text-${product.id}">❤️ ${hasVoted ? 'ভোট দিয়েছেন' : 'ভোট দিন'}</span>
              <span id="vote-count-${product.id}">(${currentVotes})</span>
            </button>
          </div>
        `;
        
        gridContainer.appendChild(card);
        
        // Trigger entrance animation
        setTimeout(() => card.classList.add('loaded'), 50);
      });
    }

    // একটি নির্দিষ্ট পণ্যের ভোট ডিসপ্লে আপডেট করুন
    function updateVoteDisplay(productId) {
      const countEl = document.getElementById(`vote-count-${productId}`);
      const btnEl = document.getElementById(`btn-${productId}`);
      const btnTextEl = document.getElementById(`btn-text-${productId}`);
      const cardEl = btnEl ? btnEl.closest('.product-card') : null;
      
      if (countEl) {
        countEl.textContent = `(${getVotes(productId)})`;
      }
      
      if (btnEl && sessionStorage.getItem(`session_voted_${productId}`)) {
        btnEl.className = 'vote-btn mt-3 w-full py-2 rounded-xl text-[10px] md:text-xs font-bold flex items-center justify-center gap-1 md:gap-2 transition-all bg-gradient-to-r from-[#e91e8c] to-[#7c3aed] text-white voted';
        btnTextEl.textContent = '❤️ ভোট দিয়েছেন';
        
        if (cardEl) {
            cardEl.classList.remove('border-white/10');
            cardEl.classList.add('border-[#e91e8c]/50', 'ring-1', 'ring-[#e91e8c]/30');
        }
      }
      
      updateTotalVotesCounter();
    }

    // উপরের মোট ভোট কাউন্টার আপডেট করুন
    function updateTotalVotesCounter() {
      // Animate numbers
      const total = getTotalVotes();
      const currentVal = parseInt(totalVotesCounter.textContent || '0');
      
      if (currentVal !== total) {
        // Quick simple counter animation
        totalVotesCounter.classList.add('scale-125', 'text-white');
        setTimeout(() => {
          totalVotesCounter.textContent = total;
          totalVotesCounter.classList.remove('scale-125', 'text-white');
        }, 150);
      }
    }

    // ==========================================
    // কোর ভোটিং লজিক
    // ==========================================

    // ভোটিং ফাংশন
    function castVote(productId, event) {
      
      // Check deadline first
      if (isVotingClosed()) {
        showToast("ভোটিং এর সময় শেষ হয়ে গেছে!", "warning");
        return;
      }

      // সেশনে চেক করুন এই পণ্যে আগে ভোট দেওয়া হয়েছে কিনা
      const sessionVoted = sessionStorage.getItem(`session_voted_${productId}`);
      if (sessionVoted) {
        showToast("আপনি ইতিমধ্যে এই পণ্যে ভোট দিয়েছেন!", "warning");
        return;
      }
      
      // লোকাল স্টোরেজে ভোট বাড়ান
      const current = getVotes(productId);
      localStorage.setItem(`vote_count_${productId}`, current + 1);
      
      // সেশনে মার্ক করুন যে ভোট দেওয়া হয়েছে
      sessionStorage.setItem(`session_voted_${productId}`, 'true');
      
      // UI আপডেট করুন
      updateVoteDisplay(productId);
      showToast("ভোট দেওয়া হয়েছে! ❤️", "success");
      
      // পার্টিকেল এনিমেশন দেখান
      if (event) {
        triggerVoteAnimation(event);
      }
    }

    // ==========================================
    // এনিমেশন এবং ইউটিলিটি
    // ==========================================

    // ক্লিক করা জায়গায় একটু পার্টিকেল এনিমেশন তৈরি করুন
    function triggerVoteAnimation(e) {
      const btn = e.currentTarget;
      const rect = btn.getBoundingClientRect();
      
      // Create particle element
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.innerHTML = '+১ ❤️';
      
      // Position at click coordinate or center of button
      const x = e.clientX ? e.clientX : rect.left + rect.width / 2;
      const y = e.clientY ? e.clientY : rect.top + rect.height / 2;
      
      particle.style.left = `${x}px`;
      particle.style.top = `${y}px`;
      
      document.body.appendChild(particle);
      
      // Remove after animation completes
      setTimeout(() => particle.remove(), 1000);
    }

    // টোস্ট নোটিফিকেশন দেখানোর ফাংশন
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <div class="flex items-center gap-2">
          <i class="fa-solid fa-circle-${type === 'success' ? 'check' : 'exclamation'}"></i>
          <span>${message}</span>
        </div>
      `;
      
      container.appendChild(toast);
      
      // Remove after animation
      setTimeout(() => {
        if(container.contains(toast)) {
          toast.remove();
        }
      }, 3000);
    }

    // ডেডলাইন চেক করার ফাংশন
    function checkDeadline() {
      if (typeof VOTING_DEADLINE !== 'undefined' && VOTING_DEADLINE) {
        const deadlineContainer = document.getElementById('deadline-container');
        const deadlineDateEl = document.getElementById('deadline-date');
        
        const date = new Date(VOTING_DEADLINE);
        // Format Bengali Date mapping manually or using Intl
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        deadlineDateEl.textContent = new Intl.DateTimeFormat('bn-BD', options).format(date);
        
        deadlineContainer.classList.remove('hidden');
      }
    }

    function isVotingClosed() {
      if (typeof VOTING_DEADLINE !== 'undefined' && VOTING_DEADLINE) {
         const now = new Date();
         const target = new Date(VOTING_DEADLINE);
         return now > target;
      }
      return false;
    }

    // অন্য ট্যাব থেকে আপডেট আসলে রিয়েল-টাইমে চেঞ্জ ধরার জন্য
    function setupStorageEvents() {
      window.addEventListener('storage', (e) => {
        if (e.key && e.key.startsWith('vote_count_')) {
          const productId = parseInt(e.key.replace('vote_count_', ''));
          if (!isNaN(productId)) {
            updateVoteDisplay(productId);
          }
        }
      });
    }

    // অ্যাপ চালু করুন
    window.onload = initApp;

  </script>
</body>
</html>
